<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phinix - Master Intelligence</title>
    <style>
        :root {
            --bg: #050508; --panel: #0d1117; --accent: #ffca28;
            --up: #2eb872; --down: #fa5252; --border: #1c2128;
            --text: #c9d1d9; --pink: #ff69b4; --blue: #4fc3f7;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 10px; font-size: 11px; }
        
        /* Nav Tabs */
        .nav { position: sticky; top: 0; background: var(--bg); z-index: 100; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
        .toggle-bar { display: flex; gap: 4px; overflow-x: auto; padding: 5px 0; }
        .btn { flex: 1; min-width: 65px; background: var(--panel); border: 1px solid var(--border); color: #555; padding: 10px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .btn.active { border-color: var(--accent); color: var(--accent); background: #161b22; }

        /* Global Pattern Input */
        .input-zone { background: var(--panel); padding: 12px; margin: 10px 0; border: 1px solid var(--blue); border-radius: 6px; }
        .input-row { display: flex; gap: 5px; }
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; flex: 1; border-radius: 4px; }
        .add-btn { background: var(--blue); border: none; padding: 10px; width: 70px; font-weight: bold; border-radius: 4px; }

        /* Logic Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 12px; border-radius: 6px; position: relative; }
        .full { grid-column: span 2; }
        .card-title { color: var(--accent); font-size: 9px; letter-spacing: 1px; margin-bottom: 10px; border-bottom: 1px solid #1c2128; padding-bottom: 4px; opacity: 0.8; }
        
        .row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .val { font-weight: bold; color: #fff; }
        .label { color: #777; }
        
        .tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .tag { background: #000; border: 1px solid var(--border); padding: 4px 6px; border-radius: 3px; font-size: 9px; }
        .hot { border-color: var(--up); color: var(--up); }
        .cold { border-color: var(--pink); color: var(--pink); opacity: 0.6; }
        .normal { border-color: var(--blue); color: var(--blue); }

        .big-info { font-size: 16px; color: var(--accent); font-weight: bold; margin-top: 5px; }
        .flash { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="nav"><div class="toggle-bar" id="tabs"></div></div>

    <div class="input-zone">
        <div class="input-row">
            <input type="text" id="pIn" placeholder="SAVE PATTERN" style="text-transform:uppercase">
            <button class="add-btn" onclick="saveP()">ADD</button>
        </div>
        <div id="pTags" class="tag-list"></div>
    </div>

    <div id="display" class="grid"></div>

<script>
    let activeCol = 1;
    let patterns = JSON.parse(localStorage.getItem('phinix_intel_p')) || ["AA", "BB", "ABAB"];

    function saveP() {
        let v = document.getElementById('pIn').value.toUpperCase().trim();
        if(v && !patterns.includes(v)) {
            patterns.push(v);
            localStorage.setItem('phinix_intel_p', JSON.stringify(patterns));
            document.getElementById('pIn').value = "";
            render();
        }
    }

    function removeP(p) {
        patterns = patterns.filter(i => i !== p);
        localStorage.setItem('phinix_intel_p', JSON.stringify(patterns));
        render();
    }

    function init() {
        let h = "";
        for(let i=1; i<=7; i++) h += `<button class="btn ${i===activeCol?'active':''}" onclick="activeCol=${i}; init(); render();">STRM ${i}</button>`;
        document.getElementById('tabs').innerHTML = h;
    }

    function render() {
        const streams = JSON.parse(localStorage.getItem('phinix_stream')) || {};
        const data = streams[activeCol] || "";
        const display = document.getElementById('display');
        document.getElementById('pTags').innerHTML = patterns.map(p => `<span class="tag normal" onclick="removeP('${p}')">${p} ×</span>`).join('');

        if (data.length < 10) {
            display.innerHTML = `<div class="card full" style="text-align:center; padding:40px;">COLLECTING DATA FOR COLUMN ${activeCol}...</div>`;
            return;
        }

        // --- MATH ENGINE ---
        const mid = Math.floor(data.length / 2);
        const oldD = data.slice(0, mid);
        const newD = data.slice(-mid);

        // A:B Ratios
        const getRatio = (str) => {
            const a = (str.match(/A/g)||[]).length;
            const b = (str.match(/B/g)||[]).length;
            return { a, b, dom: a >= b ? 'A' : 'B', perc: ((Math.max(a,b)/str.length)*100).toFixed(0) };
        };
        const oldR = getRatio(oldD);
        const newR = getRatio(newD);

        // Streaks & Caps
        const getStats = (str) => {
            let s=[], cur=1;
            for(let i=1; i<str.length; i++) { if(str[i]===str[i-1]) cur++; else { s.push({c:str[i-1], l:cur}); cur=1; } }
            s.push({c:str[str.length-1], l:cur});
            const maxA = Math.max(...s.filter(x=>x.c==='A').map(x=>x.l), 0);
            const maxB = Math.max(...s.filter(x=>x.c==='B').map(x=>x.l), 0);
            return { s, maxA, maxB, last: s[s.length-1] };
        };
        const stats = getStats(data);
        
        // --- VISUALIZATION ---
        display.innerHTML = `
            <div class="card">
                <div class="card-title">A:B DOMINANCE</div>
                <div class="row"><span class="label">BEFORE:</span> <span class="val">${oldR.dom} (${oldR.perc}%)</span></div>
                <div class="row"><span class="label">NOW:</span> <span class="val" style="color:var(--up)">${newR.dom} (${newR.perc}%)</span></div>
                <div class="big-info">${newR.a}:${newR.b}</div>
            </div>

            <div class="card">
                <div class="card-title">WEAK ELEMENT LIMIT</div>
                <div class="row"><span class="label">MAX A:</span> <span class="val">${stats.maxA}</span></div>
                <div class="row"><span class="label">MAX B:</span> <span class="val">${stats.maxB}</span></div>
                <div class="val flash" style="margin-top:5px; color:var(--pink)">
                    ${stats.maxA < stats.maxB ? 'A' : 'B'} CAPPED @ ${Math.min(stats.maxA, stats.maxB)}
                </div>
            </div>

            <div class="card full">
                <div class="card-title">PATTERN LEARNING (BEFORE VS NOW)</div>
                <div class="tag-list">
                    ${patterns.map(p => {
                        const o = oldD.split(p).length - 1;
                        const n = newD.split(p).length - 1;
                        let status = "normal";
                        if (n > o) status = "hot";
                        if (o > 0 && n === 0) status = "cold";
                        return `<div class="tag ${status}">${p} [${n}]</div>`;
                    }).join('')}
                </div>
                <div style="margin-top:10px; font-size:10px;">
                    ${(data.split(newR.dom + newR.dom).length - 1) > 3 ? 'BEHAVIOR: FOLLOWING PATTERNS' : 'BEHAVIOR: RANDOM/CHOP'}
                </div>
            </div>

            <div class="card full">
                <div class="card-title">STREAK DURATION DISTRIBUTION</div>
                <div class="tag-list">
                    ${[...new Set(stats.s.map(x=>x.l))].sort((a,b)=>a-b).map(len => {
                        const count = stats.s.filter(x=>x.l===len).length;
                        return `<div class="tag">LEN ${len}: ${count}x</div>`;
                    }).join('')}
                </div>
                <div class="row" style="margin-top:10px; border-top:1px solid #1c2128; padding-top:5px;">
                    <span class="label">AVG STREAK:</span>
                    <span class="val">${(stats.s.reduce((a,b)=>a+b.l,0)/stats.s.length).toFixed(1)}</span>
                </div>
            </div>

            <div class="card full">
                <div class="card-title">ENVIRONMENT SHIFT</div>
                <div class="row">
                    <span class="label">BEFORE:</span> 
                    <span class="val">${(oldD.match(/(.)\1/g)||[]).length > (oldD.length/4) ? 'PATTERN' : 'RANDOM'}</span>
                </div>
                <div class="row">
                    <span class="label">NOW:</span> 
                    <span class="val" style="color:var(--blue)">${(newD.match(/(.)\1/g)||[]).length > (newD.length/4) ? 'PATTERN' : 'RANDOM'}</span>
                </div>
                <div class="val" style="margin-top:10px; color:var(--pink)">
                    ${stats.last.l >= (stats.last.c==='A'?stats.maxA:stats.maxB) ? 'STREAK LIMIT REACHED: BREAK EXPECTED' : ''}
                </div>
            </div>
        `;
    }

    window.addEventListener('storage', render);
    setInterval(render, 1500);
    init();
    render();
</script>
<script src="nav.js"></script>
</body>
</html>
