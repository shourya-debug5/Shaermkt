<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phinix Ensemble - 8 Factor Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #050508; --accent: #ffca28; --border: #30363d; --m-clr: #4dabf7; --i-clr: #ff922b; }
        body { background: var(--bg); color: #c9d1d9; font-family: monospace; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Nav bar for mobile */
        .col-bar { display: flex; gap: 8px; margin-bottom: 15px; position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 10px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .col-bar::-webkit-scrollbar { display: none; }
        .col-btn { flex: 0 0 75px; background: #161b22; border: 1px solid var(--border); color: #8b949e; border-radius: 6px; font-weight: bold; padding: 12px 0; font-size: 11px; }
        .col-btn.active { border-color: var(--accent); color: var(--accent); background: #1c2128; }

        /* Grid: 1 col on phone, 2 on tablet */
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }
        
        .card { background: #0d1117; border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; height: 380px; overflow: hidden; }
        .card-header { display: flex; justify-content: space-between; font-size: 10px; height: 30px; align-items: center; border-bottom: 1px solid #1c2128; margin-bottom: 8px; font-weight: bold; }
        .stats { display: flex; gap: 5px; margin-bottom: 8px; font-size: 10px; }
        .s-box { flex: 1; background: #161b22; padding: 5px; border-radius: 4px; border: 1px solid #222; text-align: center; }
        
        .pred-val { color: var(--accent); font-size: 18px; padding: 2px 10px; background: #000; border: 1px solid var(--accent); border-radius: 4px; min-width: 30px; text-align: center; }
        
        .viewport { flex: 1; min-height: 140px; overflow-x: auto; background: #080808; border-radius: 6px; margin-bottom: 8px; border: 1px solid #1a1a1a; }
        .canvas-inner { height: 100%; min-width: 100%; }

        .feed { background: rgba(0,0,0,0.4); border-radius: 6px; padding: 6px; font-size: 9px; height: 80px; overflow-y: auto; border: 1px solid #222; }
        .f-item { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #1a1a1a; }
        .f-item b { color: var(--accent); }
    </style>
</head>
<body>

    <div class="col-bar" id="colBar"></div>
    <div class="grid" id="mainGrid"></div>

<script>
    const factors = [
        {id: 'm1', name: 'TOP 1 MIRROR', clr: 'var(--m-clr)'},
        {id: 'm3', name: 'TOP 3 MIRROR', clr: 'var(--m-clr)'},
        {id: 'mAll', name: 'ALL MIRROR', clr: 'var(--m-clr)'},
        {id: 'i1', name: 'TOP 1 INVERSE', clr: 'var(--i-clr)'},
        {id: 'i3', name: 'TOP 3 INVERSE', clr: 'var(--i-clr)'},
        {id: 'iAll', name: 'ALL INVERSE', clr: 'var(--i-clr)'},
        {id: 'comb3', name: 'TOP 3 M+I CONSENSUS', clr: '#fff'},
        {id: 'combAll', name: 'GLOBAL M+I WEIGHTED', clr: 'var(--accent)'}
    ];

    let activeCol = 1;
    let charts = {};
    let scores = JSON.parse(sessionStorage.getItem('ens_scores')) || {};
    factors.forEach(f => { if(!scores[f.id]) scores[f.id] = [0]; });
    
    let lastPreds = JSON.parse(sessionStorage.getItem('ens_preds')) || {};

    function init() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = ''; 
        factors.forEach(f => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.borderTop = `3px solid ${f.clr}`;
            card.innerHTML = `
                <div class="card-header" style="color:${f.clr}">${f.name} <span id="p-${f.id}" class="pred-val">--</span></div>
                <div class="stats">
                    <div class="s-box">TOTAL: <b id="cnt-${f.id}">0</b></div>
                    <div class="s-box">NET +/-: <b id="pk-${f.id}">0</b></div>
                </div>
                <div class="viewport"><div class="canvas-inner" id="v-${f.id}"><canvas id="c-${f.id}"></canvas></div></div>
                <div class="feed" id="feed-${f.id}">Scanning...</div>
            `;
            grid.appendChild(card);
            createChart(f.id, f.clr);
        });
        renderNav();
        refresh();
        window.addEventListener('storage', (e) => { if(e.key === 'phinix_stream') refresh(); });
    }

    function createChart(id, clr) {
        const ctx = document.getElementById('c-'+id).getContext('2d');
        charts[id] = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: scores[id].map((_,i)=>i), 
                datasets: [{ data: scores[id], borderColor: getHex(clr), borderWidth: 2, tension: 0.1, pointRadius: 0 }] 
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                animation: false,
                scales: { 
                    y: { grid: {color:'#1a1d23'}, suggestedMin: -5, suggestedMax: 5 }, 
                    x: { display: false } 
                }, 
                plugins: { legend: {display: false} } 
            }
        });
    }

    function getHex(c) {
        if(c.includes('m-clr')) return '#4dabf7';
        if(c.includes('i-clr')) return '#ff922b';
        if(c.includes('accent')) return '#ffca28';
        return '#ffffff';
    }

    function refresh() {
        const streams = JSON.parse(localStorage.getItem('phinix_stream')) || {};
        const target = streams[activeCol] || "";
        if(target.length < 6) return;

        const actual = target.slice(-1);
        const trigger = target.slice(-6, -1);
        const invTrigger = trigger.split('').map(c => c==='A'?'B':'A').join('');

        // 1. Process previous prediction vs Actual
        factors.forEach(f => {
            if(lastPreds[f.id]) {
                let s = scores[f.id];
                s.push(s[s.length-1] + (lastPreds[f.id] === actual ? 1 : -1));
                charts[f.id].data.labels.push("");
                charts[f.id].update('none');
                const vp = document.getElementById(`v-${f.id}`).parentNode;
                vp.scrollLeft = vp.scrollWidth;
            }
        });

        // 2. Vertical String Matching Logic
        let mirrors = [], inverses = [];
        for (let c = 1; c <= 7; c++) {
            const data = streams[c] || "";
            const lag = (c == activeCol) ? 5 : 1;
            for (let i = 0; i < data.length - 6 - lag; i++) {
                // Mirror: Match trigger, predict what followed
                if (data.substring(i, i+5) === trigger) {
                    mirrors.push({src:c, pred:data[i+5]});
                }
                // Inverse: Match the flipped trigger, predict the flipped result
                if (data.substring(i, i+5) === invTrigger) {
                    inverses.push({src:c, pred:data[i+5]==='A'?'B':'A'});
                }
            }
        }

        // 3. Update the 8 Predictors
        lastPreds = {
            m1: mirrors.length ? mirrors[mirrors.length-1].pred : null,
            m3: getVote(mirrors.slice(-3)),
            mAll: getVote(mirrors),
            i1: inverses.length ? inverses[inverses.length-1].pred : null,
            i3: getVote(inverses.slice(-3)),
            iAll: getVote(inverses),
            comb3: getVote([...mirrors.slice(-3), ...inverses.slice(-3)]),
            combAll: getVote([...mirrors, ...inverses])
        };

        sessionStorage.setItem('ens_preds', JSON.stringify(lastPreds));
        sessionStorage.setItem('ens_scores', JSON.stringify(scores));

        // Update UI Boxes
        updateUI('m1', mirrors.slice(-1), lastPreds.m1);
        updateUI('m3', mirrors.slice(-3), lastPreds.m3);
        updateUI('mAll', mirrors, lastPreds.mAll);
        updateUI('i1', inverses.slice(-1), lastPreds.i1);
        updateUI('i3', inverses.slice(-3), lastPreds.i3);
        updateUI('iAll', inverses, lastPreds.iAll);
        updateUI('comb3', [...mirrors.slice(-3), ...inverses.slice(-3)], lastPreds.comb3);
        updateUI('combAll', [...mirrors, ...inverses], lastPreds.combAll);
    }

    function getVote(arr) {
        if(!arr.length) return null;
        let v = {A:0, B:0};
        arr.forEach(d => v[d.pred]++);
        return v.A === v.B ? null : (v.A > v.B ? 'A' : 'B');
    }

    function updateUI(id, data, pred) {
        document.getElementById('p-'+id).innerText = pred || '--';
        document.getElementById('cnt-'+id).innerText = data.length;
        document.getElementById('pk-'+id).innerText = scores[id][scores[id].length - 1]; // Net score
        document.getElementById('feed-'+id).innerHTML = data.slice(-8).reverse().map(d => `
            <div class="f-item">C${d.src} Found Match -> <b>${d.pred}</b></div>
        `).join('') || "No active matches.";
    }

    function renderNav() {
        let h = "";
        for(let i=1; i<=7; i++) h += `<button class="col-btn ${i==activeCol?'active':''}" onclick="activeCol=${i};renderNav();refresh();">COL ${i}</button>`;
        document.getElementById('colBar').innerHTML = h;
    }

    init();
</script>
</body>
</html>
