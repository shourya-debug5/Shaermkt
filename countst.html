<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phinix Dashboard Pro</title>
    <style>
        :root {
            --bg: #05070a; --panel: #0d1117; --accent: #ffca28;
            --up: #2eb872; --down: #fa5252; --border: #30363d;
        }
        body { background: var(--bg); color: #c9d1d9; font-family: monospace; margin: 0; padding: 10px; overflow-x: hidden; }

        .header { position: sticky; top: 0; background: var(--panel); z-index: 100; border-bottom: 2px solid var(--border); margin: -10px -10px 15px -10px; padding: 10px; }
        .col-bar { display: flex; gap: 5px; margin-top: 10px; overflow-x: auto; padding-bottom: 5px; }
        .col-btn { flex: 1; min-width: 60px; background: #21262d; border: 1px solid var(--border); color: #8b949e; padding: 10px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .col-btn.active { border-color: var(--accent); color: var(--accent); background: #161b22; }

        .box { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 15px; }
        .box-title { font-weight: bold; color: var(--accent); font-size: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        .plans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .plan-card { background: #000; border: 1px solid #222; padding: 8px; border-radius: 5px; overflow: hidden; }
        .plan-label { font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .plan-pts { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
        
        /* SCROLLABLE GRAPH CONTAINER */
        .graph-viewport { 
            width: 100%; 
            height: 50px; 
            overflow-x: auto; 
            overflow-y: hidden;
            background: #080808;
            border-radius: 3px;
            display: flex;
            align-items: center;
        }
        /* Hide scrollbar but allow scrolling */
        .graph-viewport::-webkit-scrollbar { height: 2px; }
        .graph-viewport::-webkit-scrollbar-thumb { background: #333; }

        .graph-inner { height: 100%; position: relative; }
        svg { height: 100%; transform: scaleY(-1); display: block; }

        .footer-metrics { display: flex; justify-content: space-between; font-size: 10px; color: #8b949e; margin-top: 10px; background: #161b22; padding: 8px; border-radius: 4px; }
        .footer-metrics b { color: #fff; }
        
        .signal-banner { text-align: center; color: var(--accent); font-weight: bold; margin-top: 10px; font-size: 13px; border: 1px dashed var(--accent); padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b id="pageTitle" style="letter-spacing:2px;">DASHBOARD</b>
            <span id="lastUpdate" style="font-size:10px; color:#555;">REAL-TIME PROCESSING</span>
        </div>
        <div class="col-bar" id="colBar"></div>
    </div>

    <div id="container"></div>

<script>
    const CATEGORY_NAME = "Short Pattern"; 
    let currentCol = 1;
    let savedStrategies = [];

    function init() {
        document.getElementById('pageTitle').innerText = CATEGORY_NAME.toUpperCase();
        let barHtml = "";
        for(let i=1; i<=7; i++) {
            barHtml += `<button class="col-btn ${i===1?'active':''}" onclick="setCol(${i})" id="btn${i}">COL ${i}</button>`;
        }
        document.getElementById('colBar').innerHTML = barHtml;

        const all = JSON.parse(localStorage.getItem('phinix_v2')) || [];
        savedStrategies = all.filter(s => s.cat === CATEGORY_NAME);

        runCalculations();

        window.addEventListener('storage', (e) => {
            if (e.key === 'phinix_stream') runCalculations();
        });
    }

    function setCol(n) {
        currentCol = n;
        document.querySelectorAll('.col-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn'+n).classList.add('active');
        runCalculations();
    }

    function runCalculations() {
        const streamData = JSON.parse(localStorage.getItem('phinix_stream')) || {};
        const fullHistory = streamData[currentCol] || "";
        const charArray = fullHistory.split('');

        const resultsHtml = savedStrategies.map(strat => {
            let planTracks = (strat.plans || ["1"]).slice(0, 4).map(pStr => ({
                plan: pStr.split(',').map(Number),
                points: 0,
                history: [0],
                peak: 0
            }));

            let state = "IDLE"; 
            let activePattern = null;
            let step = 0;
            let currentSignal = "WAITING FOR TRIGGER...";
            let matchStreaks = []; 

            let processedStr = "";
            charArray.forEach((char) => {
                processedStr += char;

                if (state === "BETTING") {
                    let target = activePattern.p[step];
                    let isMatch = (char === target);

                    planTracks.forEach(pt => {
                        let bet = pt.plan[step] || pt.plan[pt.plan.length - 1];
                        pt.points += isMatch ? bet : -bet;
                        pt.peak = Math.max(pt.peak, pt.points);
                        pt.history.push(pt.points);
                    });

                    if (isMatch) {
                        step++;
                        if (step >= activePattern.p.length) {
                            matchStreaks.push(step);
                            state = "IDLE";
                        }
                    } else {
                        matchStreaks.push(step);
                        state = "IDLE";
                    }
                } 
                else if (state === "LOCKED") {
                    let target = activePattern.p[step];
                    if (char === target) {
                        step++;
                        if (step >= activePattern.p.length) state = "IDLE";
                    } else {
                        state = "IDLE";
                    }
                } 
                else {
                    let foundNeg = strat.negQ.find(n => processedStr.endsWith(n.t));
                    if (foundNeg) {
                        state = "LOCKED";
                        activePattern = foundNeg;
                        step = 0;
                    } else {
                        let foundHunt = strat.hunterQ.find(h => processedStr.endsWith(h.t));
                        if (foundHunt) {
                            state = "BETTING";
                            activePattern = foundHunt;
                            step = 0;
                        }
                    }
                }
            });

            if (state === "BETTING") {
                currentSignal = `STREAKING: MATCH ${activePattern.p[step]}`;
            } else if (state === "LOCKED") {
                currentSignal = "🛡️ SHIELDED (NEG TRIGGER)";
            }

            const avgStreak = matchStreaks.length 
                ? (matchStreaks.reduce((a,b) => a+b, 0) / matchStreaks.length).toFixed(1) 
                : 0;
            
            const top10 = matchStreaks.length 
                ? Math.max(...matchStreaks.slice(-10)) 
                : 0;

            return renderBox(strat.name, planTracks, avgStreak, top10, currentSignal);
        }).join('');

        document.getElementById('container').innerHTML = resultsHtml || `<div style="text-align:center; padding:50px; color:#444;">No strategies in this category.</div>`;
        
        // Auto-scroll all graphs to the end (the latest entries)
        setTimeout(() => {
            document.querySelectorAll('.graph-viewport').forEach(v => {
                v.scrollLeft = v.scrollWidth;
            });
        }, 50);
    }

    function renderBox(name, plans, avg, top, signal) {
        let plansHtml = plans.map((p, i) => {
            const color = p.points >= 0 ? 'var(--up)' : 'var(--down)';
            
            // Dynamic width: Each entry gets 5 pixels of width
            const dynamicWidth = Math.max(100, p.history.length * 5);
            const path = generateSvgPath(p.history, dynamicWidth);

            return `
                <div class="plan-card">
                    <span class="plan-label">Plan ${i+1}</span>
                    <div class="plan-pts" style="color:${color}">${p.points >= 0 ? '+' : ''}${p.points}</div>
                    <div style="font-size:9px; color:#555; margin-bottom:5px;">PEAK: ${p.peak}</div>
                    <div class="graph-viewport">
                        <div class="graph-inner" style="width:${dynamicWidth}px">
                            <svg width="${dynamicWidth}" viewBox="0 0 ${dynamicWidth} 40" preserveAspectRatio="none">
                                <polyline points="${path}" fill="none" stroke="${color}" stroke-width="2" vector-effect="non-scaling-stroke" />
                            </svg>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        return `
            <div class="box">
                <div class="box-title">
                    <span>${name}</span>
                </div>
                <div class="plans-grid">
                    ${plansHtml}
                </div>
                <div class="footer-metrics">
                    <span>AVG STREAK: <b>${avg}</b></span>
                    <span>TOP (LAST 10): <b>${top}</b></span>
                </div>
                <div class="signal-banner">${signal}</div>
            </div>
        `;
    }

    function generateSvgPath(history, width) {
        if (history.length < 2) return `0,20 ${width},20`;
        const maxAbs = Math.max(...history.map(Math.abs), 5); 
        const spacing = width / (history.length - 1);
        return history.map((p, i) => {
            const y = 20 - (p * (20 / maxAbs));
            return `${i * spacing},${y}`;
        }).join(' ');
    }

    init();
</script>
<script src="nav.js"></script>
</body>
</html>
